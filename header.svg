<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121212"/>
      <stop offset="50%" style="stop-color:#1a2a2b"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#24A2A7"/>
      <stop offset="100%" style="stop-color:#00D1FF"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#121212"/>
      <stop offset="40%" style="stop-color:#24A2A7"/>
      <stop offset="100%" style="stop-color:#00D1FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#24A2A7" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="400" y1="0" x2="400" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="800" y1="0" x2="800" y2="220"/>
    <line x1="1000" y1="0" x2="1000" y2="220"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.6"/>

  <!-- SAM -->
  <text x="600" y="105" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="80" letter-spacing="6" fill="#FFFFFF">
    SAM
    <tspan fill="url(#accent)"> BLOCH</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="145" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="16" letter-spacing="8" fill="#24A2A7" opacity="0.9">
    PROGRAM MANAGER &amp; INNOVATOR
  </text>

  <!-- Decorative terminal prompt -->
  <text x="600" y="175" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#24A2A7" opacity="0.35">
    ~/sam-bloch &gt; building systems that put people first _
  </text>

  <!-- Bottom wave -->
  <path d="M0,200 Q300,180 600,200 Q900,220 1200,200 L1200,220 L0,220 Z" fill="url(#wave)" opacity="0.15"/>

  <!-- Accent line bottom -->
  <rect x="0" y="218" width="1200" height="2" fill="url(#accent)" opacity="0.3"/>
</svg>
